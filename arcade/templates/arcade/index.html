{% extends "arcade/base.html" %}

{% block content %}
<section class="lobby">
    <h2>Select a Game</h2>
    <div class="game-grid">
        {% for game in games %}
        <div class="game-card">
            <h3>{{ game.title }}</h3>
            <p>{{ game.description }}</p>
            <a href="{% url 'play_game' game.slug %}" class="play-btn">
                Play Now
            </a>
        </div>
        {% empty %}
        <p>No games found. Add some in the Admin panel!</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
